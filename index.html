<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>811 Blog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }
    header {
      background: #111;
      color: white;
      padding: 48px 20px;
      text-align: center;
    }
    main {
      max-width: 860px;
      margin: 40px auto;
      background: white;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin-top: 0;
    }
    .post {
      border-top: 1px solid #e5e5e5;
      padding-top: 22px;
      margin-top: 22px;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    footer {
      text-align: center;
      padding: 28px 20px 40px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>811 Blog</h1>
    <p>Thoughts, updates, and articles</p>
  </header>

  <main>
    <h2>Welcome</h2>
    <p>This is my first website hosted on GitHub Pages.</p>

    <div class="post">
      <h2>My First Post</h2>
      <p>Hello! This is my first post on GitHub Pages.</p>
      <p><a href="#">Read more</a></p>
    </div>

    <div class="post">
      <h2>Another Update</h2>
      <p>I’m starting simple and will improve this blog step by step.</p>
      <p><a href="#">Read more</a></p>
    </div>
  </main>

  <footer>
    © 2026 811 Blog
  </footer>
</body>
</html>
